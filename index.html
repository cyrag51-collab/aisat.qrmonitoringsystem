<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISAT College — QR Monitoring System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Consolas, monospace; background: #02111f; color: #bfc3d8; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(rgba(0,255,255,.05) 1px,transparent 1px), linear-gradient(90deg,rgba(0,255,255,.05) 1px,transparent 1px); background-size: 40px 40px; z-index: -1; }

        #login-overlay { position: fixed; inset: 0; background: #02111f; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { width: 380px; padding: 40px; border: 1px solid #00d9ff; background: #061d31; box-shadow: 0 0 20px rgba(0, 217, 255, 0.2); text-align: center; border-radius: 8px; }

        header { padding: 20px 30px; border-bottom: 1px solid #00d9ff33; display: flex; justify-content: space-between; align-items: center; background: #061d31; }
        .logo h1 { font-size: 24px; color: #00d9ff; }

        nav { display: flex; gap: 10px; padding: 15px 30px; border-bottom: 1px solid #00d9ff33; background: #02111f; position: sticky; top: 0; z-index: 100; }
        nav button { background: transparent; border: 1px solid #00d9ff55; color: #00d9ff; padding: 8px 15px; cursor: pointer; font-family: inherit; }
        nav button.active { background: #00d9ff22; border-color: #00d9ff; }

        .container { padding: 30px; }
        .hidden { display: none !important; }
        .panel { border: 1px solid #00d9ff33; padding: 20px; border-radius: 8px; background: #061d31aa; margin-bottom: 20px; }
        
        .pass-container { position: relative; width: 100%; }
        .toggle-pass { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #00d9ff; font-size: 10px; cursor: pointer; }

        input { width: 100%; padding: 12px; margin: 8px 0; background: #001a2a; color: #00d9ff; border: 1px solid #00d9ff55; font-family: inherit; }
        button.action { background: #00d9ff; color: #02111f; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 5px; }
        button.small-btn { padding: 6px 10px; font-size: 11px; cursor: pointer; background: #00d9ff22; color: #00d9ff; border: 1px solid #00d9ff55; }
        .btn-red { color: #ff4444; border-color: #ff444455; }
        .btn-green { color: #00ff99; border-color: #00ff9955; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        th, td { padding: 10px; border: 1px solid #00d9ff22; text-align: left; }
        th { color: #00d9ff; background: #00d9ff08; }
        
        #reader { width: 100%; max-width: 400px; margin: 10px auto; border: 1px solid #00d9ff; background: #000; }
        #qr-modal { position: fixed; inset: 0; background: rgba(2, 17, 31, 0.95); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; }
        #qr-container { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="qr-modal">
    <h2 style="color: #00ff99; margin-bottom: 15px;">SCAN PASS</h2>
    <div id="qr-container"></div>
    <p id="qr-text" style="color: #00d9ff; font-size: 11px; margin-bottom: 20px;"></p>
    <button class="small-btn btn-red" onclick="closeQR()">CLOSE</button>
</div>

<div id="login-overlay">
    <div class="login-box">
        <div id="login-form">
            <h2>SYSTEM LOGIN</h2>
            <input type="text" id="username" placeholder="Username">
            <div class="pass-container">
                <input type="password" id="password" placeholder="Password">
                <button class="toggle-pass" onclick="togglePass('password')">SHOW</button>
            </div>
            <button class="action" onclick="handleLogin()">ACCESS SYSTEM</button>
            <div style="margin-top: 15px; font-size: 11px;">
                <a href="#" onclick="alert('Contact IT Support.')" style="color:#ffcc00; text-decoration: none; margin-right: 10px;">Forgot Password?</a>
                <a href="#" onclick="toggleAuth('signup')" style="color:#00d9ff; text-decoration: none;">Create Account</a>
            </div>
        </div>
        <div id="signup-form" class="hidden">
            <h2>NEW ACCOUNT</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-user" placeholder="Username">
            <div class="pass-container">
                <input type="password" id="reg-pass" placeholder="Password">
                <button class="toggle-pass" onclick="togglePass('reg-pass')">SHOW</button>
            </div>
            <button class="action" onclick="handleSignup()">REGISTER</button>
            <button class="action" style="background:transparent; color:#00d9ff; margin-top:10px" onclick="toggleAuth('login')">BACK</button>
        </div>
    </div>
</div>

<header>
    <div class="logo"><h1>AISAT</h1></div>
    <div>
        <span id="display-info" style="color: #00ff99; font-size: 12px; margin-right: 10px;"></span>
        <button onclick="location.reload()" class="small-btn btn-red">LOGOUT</button>
    </div>
</header>

<nav>
    <button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
    <button id="nav-admin" class="tab hidden" onclick="showTab('admin-section',this)">Admin Tools</button>
    <button class="tab" onclick="showTab('borrow-section',this)">Borrow Items</button>
    <button class="tab" onclick="showTab('notif-section',this)">Alerts</button>
</nav>

<div class="container">
    <section id="dashboard">
        <div class="panel">
            <h3>My Inventory</h3>
            <table>
                <thead><tr><th>Item</th><th>ID</th><th>Borrowed</th><th>Returned</th><th>Status</th></tr></thead>
                <tbody id="myItemsTable"></tbody>
            </table>
        </div>
    </section>

    <section id="admin-section" class="hidden">
        <div class="panel">
            <h3>QR Return Scanner</h3>
            <div id="reader"></div>
            <button class="action" onclick="startScanner()">START CAMERA</button>
            <button id="stop-scan-btn" class="action btn-red hidden" onclick="stopScanner()">STOP CAMERA</button>
        </div>
        <div class="panel">
            <h3>Pending Requests</h3>
            <table id="adminRequestTable"></table>
        </div>
        <div class="panel">
            <h3>User Database</h3>
            <table id="userDatabaseTable"></table>
        </div>
        <div class="panel">
            <h3>Stock Management</h3>
            <input id="eqName" placeholder="Item Name">
            <input type="number" id="eqQty" placeholder="Quantity">
            <button class="action" onclick="addEquipment()">ADD STOCK</button>
        </div>
    </section>

    <section id="borrow-section" class="hidden">
        <div class="panel">
            <h3>Request Items</h3>
            <div id="borrow-list-container"></div>
            <button class="action" onclick="requestBulk()">SUBMIT REQUESTS</button>
        </div>
    </section>

    <section id="notif-section" class="hidden">
        <div class="panel">
            <h3>Active QR Passes</h3>
            <div id="notif-list"></div>
        </div>
        <div class="panel">
            <h3>System History</h3>
            <table>
                <thead><tr><th>Time</th><th>User</th><th>Item</th><th>Log</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </section>
</div>

<script>
let users = JSON.parse(localStorage.getItem('aisat_users')) || {
    "admin": { password: "Admin123", role: "admin", name: "System Admin" }
};
let equipment = JSON.parse(localStorage.getItem('aisat_equip')) || [];
let historyLog = JSON.parse(localStorage.getItem('aisat_history')) || [];
let currentUser = null;
let html5QrCode = null;

function save() {
    localStorage.setItem('aisat_users', JSON.stringify(users));
    localStorage.setItem('aisat_equip', JSON.stringify(equipment));
    localStorage.setItem('aisat_history', JSON.stringify(historyLog));
    renderAll();
}

function togglePass(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function logEvent(user, item, event) {
    const time = new Date().toLocaleString();
    historyLog.unshift({ time, user, item, event });
    if(historyLog.length > 50) historyLog.pop();
    save();
}

function handleLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if (users[u] && users[u].password === p) {
        currentUser = { ...users[u], username: u };
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('display-info').textContent = `${currentUser.name} (@${u})`;
        document.getElementById('nav-admin').classList.toggle('hidden', currentUser.role !== 'admin');
        renderAll();
    } else { alert("Error: Access Denied"); }
}

function handleSignup() {
    const u = document.getElementById('reg-user').value.trim();
    if(!u) return;
    users[u] = { name: document.getElementById('reg-name').value, password: document.getElementById('reg-pass').value, role: "user" };
    save(); toggleAuth('login');
}

function renderAll() {
    if(!currentUser) return;

    const myItems = equipment.filter(e => e.borrower === currentUser.username);
    document.getElementById('myItemsTable').innerHTML = myItems.map(e => `
        <tr><td>${e.baseName}</td><td>${e.id}</td><td>${e.borrowTime || '--'}</td><td>${e.returnTime || '--'}</td><td>${e.status}</td></tr>
    `).join('') || 'No records.';

    const qrItems = equipment.filter(e => e.borrower === currentUser.username && e.status === 'Borrowed');
    document.getElementById('notif-list').innerHTML = qrItems.map(e => `
        <div class="panel"><strong>${e.baseName}</strong> (ID: ${e.id})<br><button class="action" onclick="openQR('${e.id}','${e.baseName}')">SHOW QR</button></div>
    `).join('') || 'No active qr.';

    document.getElementById('historyBody').innerHTML = historyLog.map(h => `
        <tr><td>${h.time}</td><td>${h.user}</td><td>${h.item}</td><td>${h.event}</td></tr>
    `).join('');

    if(currentUser.role === 'admin') {
        const pending = equipment.filter(e => e.status === 'Pending');
        const grouped = {};
        pending.forEach(item => {
            const key = `${item.borrower}|${item.baseName}`;
            if(!grouped[key]) grouped[key] = { user: item.borrower, item: item.baseName, count: 0 };
            grouped[key].count++;
        });

        document.getElementById('adminRequestTable').innerHTML = `<thead><tr><th>Item</th><th>User</th><th>Qty</th><th>Action</th></tr></thead>` + 
        Object.values(grouped).map(g => `
            <tr><td>${g.item}</td><td>${g.user}</td><td>${g.count}</td>
            <td><button class="small-btn btn-green" onclick="bulkAction('${g.user}', '${g.item}', 'approve')">APPROVE ALL</button></td></tr>
        `).join('') || 'No pending requests.';

        document.getElementById('userDatabaseTable').innerHTML = `<thead><tr><th>Name</th><th>User</th><th>Role</th></tr></thead>` +
        Object.keys(users).map(u => `<tr><td>${users[u].name}</td><td>${u}</td><td>${users[u].role}</td></tr>`).join('');
    }

    const cats = [...new Set(equipment.map(e => e.baseName))];
    document.getElementById('borrow-list-container').innerHTML = cats.map(cat => {
        const avail = equipment.filter(e => e.baseName === cat && e.status === 'Available').length;
        return `<div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between">
            <span>${cat} (${avail})</span>
            <input type="number" class="qty-input" data-cat="${cat}" min="0" max="${avail}" value="0" style="width:60px; margin:0">
        </div>`;
    }).join('');
}

function bulkAction(user, itemName, action) {
    const time = new Date().toLocaleString();
    equipment.filter(e => e.borrower === user && e.baseName === itemName && e.status === 'Pending').forEach(item => {
        item.status = 'Borrowed'; 
        item.borrowTime = time;
        item.returnTime = '--';
    });
    logEvent(user, itemName, "Approved");
}

function returnItem(id) {
    const item = equipment.find(e => e.id === id);
    if(item) {
        const u = item.borrower;
        item.returnTime = new Date().toLocaleString();
        item.status = 'Available'; 
        item.borrower = ''; 
        logEvent(u, item.baseName, "Item Returned");
    }
}

function requestBulk() {
    document.querySelectorAll('.qty-input').forEach(input => {
        const qty = parseInt(input.value);
        const cat = input.getAttribute('data-cat');
        if(qty > 0) {
            equipment.filter(e => e.baseName === cat && e.status === 'Available').slice(0, qty).forEach(item => {
                item.status = 'Pending'; item.borrower = currentUser.username;
            });
            logEvent(currentUser.username, cat, `Requested ${qty} units`);
        }
    });
    alert("Request sent to Admin, please wait for approval");
    save();
}

function startScanner() {
    document.getElementById('stop-scan-btn').classList.remove('hidden');
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        const id = text.split('|')[1];
        returnItem(id);
        stopScanner();
    });
}

function stopScanner() {
    if(html5QrCode) html5QrCode.stop().then(() => {
        document.getElementById('stop-scan-btn').classList.add('hidden');
        document.getElementById('reader').innerHTML = "";
    });
}

function addEquipment() {
    const n = document.getElementById('eqName').value;
    const q = parseInt(document.getElementById('eqQty').value);
    for(let i=0; i<q; i++) equipment.push({ id: 'EQ-'+Math.floor(Math.random()*100000), baseName: n, status: 'Available', borrower: '', borrowTime: '', returnTime: '' });
    save();
}

function openQR(id, name) {
    document.getElementById('qr-container').innerHTML = "";
    new QRCode(document.getElementById("qr-container"), { text: `AISAT|${id}`, width: 180, height: 180 });
    document.getElementById('qr-text').innerText = name + " (" + id + ")";
    document.getElementById('qr-modal').style.display = 'flex';
}

function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
function showTab(id, btn) { 
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
}
function toggleAuth(m) {
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('signup-form').classList.add('hidden');
    document.getElementById(m + '-form').classList.remove('hidden');
}
</script>
</body>
</html>
