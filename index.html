<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISAT College — QR Equipment Monitoring System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Consolas, monospace; background: #02111f; color: #bfc3d8; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(rgba(0,255,255,.05) 1px,transparent 1px), linear-gradient(90deg,rgba(0,255,255,.05) 1px,transparent 1px); background-size: 40px 40px; z-index: -1; }

        #login-overlay { position: fixed; inset: 0; background: #02111f; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { width: 380px; padding: 40px; border: 1px solid #00d9ff; background: #061d31; box-shadow: 0 0 20px rgba(0, 217, 255, 0.2); text-align: center; border-radius: 8px; }

        header { padding: 20px 30px; border-bottom: 1px solid #00d9ff33; display: flex; justify-content: space-between; align-items: center; background: #061d31; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; width: auto; }
        .logo h1 { font-size: 24px; color: #00d9ff; }
        .logo p { font-size: 11px; letter-spacing: 1px; }

        nav { display: flex; gap: 10px; padding: 15px 30px; border-bottom: 1px solid #00d9ff33; background: #02111f; position: sticky; top: 0; z-index: 100; }
        nav button { background: transparent; border: 1px solid #00d9ff55; color: #00d9ff; padding: 8px 15px; cursor: pointer; font-family: inherit; transition: 0.3s; }
        nav button.active { background: #00d9ff22; border-color: #00d9ff; }

        .container { padding: 30px; }
        .hidden { display: none !important; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card, .panel { border: 1px solid #00d9ff33; padding: 20px; border-radius: 8px; background: #061d31aa; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #001a2a; color: #00d9ff; border: 1px solid #00d9ff55; font-family: inherit; }
        button.action { background: #00d9ff; color: #02111f; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .logout-btn { background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 5px 12px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { padding: 12px; border: 1px solid #00d9ff22; text-align: left; }
        th { background: #00d9ff11; color: #00d9ff; }

        #qr-modal { position: fixed; inset: 0; background: rgba(2, 17, 31, 0.95); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; }
        #qr-container { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        #reader { width: 100%; max-width: 400px; border: 2px solid #00d9ff; margin: 15px auto; }
    </style>
</head>
<body>

<div id="qr-modal">
    <h2 id="qr-header" style="color: #00ff99; margin-bottom: 15px;">BORROWER'S PASS</h2>
    <div id="qr-container"></div>
    <p id="qr-text" style="color: #00d9ff; font-size: 11px; margin-bottom: 20px;"></p>
    <button class="logout-btn" onclick="closeQR()">CLOSE PASS</button>
</div>

<div id="login-overlay">
    <div class="login-box">
        <div id="login-form">
            <h2>SYSTEM LOGIN</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="action" onclick="handleLogin()">ACCESS SYSTEM</button>
            <p style="font-size: 11px; margin-top: 15px;">
                <a href="#" onclick="toggleAuth('forgot')" style="color:#00d9ff;">Forgot?</a> | 
                <a href="#" onclick="toggleAuth('signup')" style="color:#00d9ff;">Sign Up</a>
            </p>
        </div>
        
        <div id="forgot-form" class="hidden">
            <h2>RECOVERY</h2>
            <p style="font-size: 12px; margin-bottom: 10px;">Enter your email to reset</p>
            <input type="email" id="forgot-email" placeholder="Email Address">
            <button class="action" onclick="handleForgot()">SEND RESET LINK</button>
            <button class="action" style="background:transparent; color:#00d9ff; border:1px solid #00d9ff" onclick="toggleAuth('login')">BACK</button>
        </div>

        <div id="signup-form" class="hidden">
            <h2>NEW ACCOUNT</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-id" placeholder="ID Number">
            <input type="text" id="reg-user" placeholder="Username">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="action" onclick="handleSignup()">CREATE</button>
            <button class="action" style="background:transparent; color:#00d9ff; border:1px solid #00d9ff" onclick="toggleAuth('login')">BACK</button>
        </div>
    </div>
</div>

<header>
    <div class="logo">
        <img src="images-removebg-preview.png" alt="AISAT" onerror="this.style.display='none'">
        <div>
            <h1>AISAT COLLEGE</h1>
            <p>Equipment Monitoring System</p>
        </div>
    </div>
    <div id="user-info" style="text-align: right;">
        <span id="display-name" style="color: #00ff99; font-weight: bold; display: block;"></span>
        <button class="logout-btn" onclick="location.reload()" style="font-size: 10px; margin-top: 5px;">LOGOUT</button>
    </div>
</header>

<nav>
    <button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
    <button id="nav-admin" class="tab hidden" onclick="showTab('admin-section',this)">Admin Tools</button>
    <button class="tab" onclick="showTab('borrow-section',this)">Borrow Items</button>
    <button class="tab" onclick="showTab('notif-section',this)">Alerts</button>
</nav>

<div class="container">
    <section id="dashboard">
        <div class="cards">
            <div class="card"><h2 id="totalEquip">0</h2><p>Total Inventory</p></div>
            <div class="card"><h2 id="pending-stat" style="color:#ffd700">0</h2><p>Pending Requests</p></div>
        </div>
        <div id="admin-log-panel" class="panel hidden">
            <h3>Recent Activity</h3>
            <table>
                <thead>
                    <tr><th>Item</th><th>User</th><th>Status</th><th>Time</th></tr>
                </thead>
                <tbody id="activityBody"></tbody>
            </table>
        </div>
    </section>

    <section id="admin-section" class="hidden">
        <div class="panel">
            <h3>QR Scanner (Return Items)</h3>
            <div id="reader"></div>
            <button class="action" onclick="initScanner()">START CAMERA</button>
        </div>
        <div class="panel">
            <h3>Add New Equipment</h3>
            <input id="eqName" placeholder="Item Name">
            <input type="number" id="eqQty" placeholder="Quantity">
            <button class="action" onclick="addEquipment()">UPDATE INVENTORY</button>
        </div>
    </section>

    <section id="borrow-section" class="hidden">
        <div class="panel">
            <h3>Request Items</h3>
            <div id="borrow-list-container"></div>
            <button class="action" onclick="requestBulk()">SUBMIT REQUEST</button>
        </div>
    </section>

    <section id="notif-section" class="hidden">
        <div class="panel">
            <h3>Notifications</h3>
            <div id="notif-list"></div>
        </div>
    </section>
</div>

<script>
let users = JSON.parse(localStorage.getItem('aisat_users')) || {
    "admin": { password: "Admin123", role: "admin", name: "System Admin", idNum: "MASTER-001" }
};
let equipment = JSON.parse(localStorage.getItem('aisat_equip')) || [];
let notifications = JSON.parse(localStorage.getItem('aisat_notifs')) || [];
let currentUser = null;
let html5QrCode = null;

function handleLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if (users[u] && users[u].password === p) {
        currentUser = { ...users[u], username: u };
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('display-name').textContent = currentUser.name.toUpperCase();
        document.getElementById('nav-admin').classList.toggle('hidden', currentUser.role !== 'admin');
        document.getElementById('admin-log-panel').classList.toggle('hidden', currentUser.role !== 'admin');
        renderAll();
    } else { alert("Access Denied: Invalid Credentials"); }
}

function handleSignup() {
    const u = document.getElementById('reg-user').value;
    if(!u) return alert("Username required");
    users[u] = {
        name: document.getElementById('reg-name').value,
        idNum: document.getElementById('reg-id').value,
        password: document.getElementById('reg-pass').value,
        role: "user"
    };
    localStorage.setItem('aisat_users', JSON.stringify(users));
    alert("Account Created!");
    toggleAuth('login');
}

function handleForgot() {
    const email = document.getElementById('forgot-email').value;
    if(email) {
        alert("Recovery link sent to: " + email);
        toggleAuth('login');
    } else {
        alert("Please enter a valid email.");
    }
}

function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        alert("Scanned: " + text);
        html5QrCode.stop();
    }).catch(err => alert("Camera Error"));
}

function renderAll() {
    document.getElementById('totalEquip').textContent = equipment.length;
    document.getElementById('pending-stat').textContent = equipment.filter(e => e.status === 'Pending').length;
 
    const cats = [...new Set(equipment.map(e => e.baseName))];
    document.getElementById('borrow-list-container').innerHTML = cats.map(cat => {
        const avail = equipment.filter(e => e.baseName === cat && e.status === 'Available').length;
        return `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222">
                    <span>${cat}</span>
                    <span>Available: ${avail} <input type="number" class="qty-input" data-cat="${cat}" min="0" max="${avail}" style="width:50px"></span>
                </div>`;
    }).join('');
}

function addEquipment() {
    const name = document.getElementById('eqName').value;
    const qty = parseInt(document.getElementById('eqQty').value) || 0;
    for(let i=0; i<qty; i++) {
        equipment.push({ id: Date.now()+Math.random(), baseName: name, status: 'Available', borrower: '' });
    }
    save();
}

function save() {
    localStorage.setItem('aisat_equip', JSON.stringify(equipment));
    localStorage.setItem('aisat_notifs', JSON.stringify(notifications));
    renderAll();
}

function showTab(id, btn) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
}

function toggleAuth(m) {
    ['login-form','signup-form','forgot-form'].forEach(f => document.getElementById(f).classList.add('hidden'));
    document.getElementById(m+'-form').classList.remove('hidden');
}

function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
</script>

</body>
</html>
